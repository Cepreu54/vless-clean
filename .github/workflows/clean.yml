name: Clean VLess Servers

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download and filter servers
        run: |
          curl -s "https://raw.githubusercontent.com/zieng2/wl/main/vless_lite.txt" | \
          grep -v '%F0%9F%87%B7%F0%9F%87%BA' > clean.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add clean.txt
          git commit -m "Auto-update clean servers $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
          git push
